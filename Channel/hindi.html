<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000">
<title>Hindi</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
}

.player-area {
  position: fixed;
  inset: 0;
  background: #000;
}

.shaka-video-container {
  width: 100% !important;
  height: 100% !important;
  background: #000 !important;
}

video {
  width: 100% !important;
  height: 100% !important;
  object-fit: contain !important;
  background: #000 !important;
}

.shaka-controls-container {
  z-index: 9999 !important;
  padding-bottom: env(safe-area-inset-bottom) !important;
}

.shaka-bottom-controls {
  width: 100% !important;
  box-sizing: border-box !important;
}

.shaka-overflow-menu {
  max-height: 70vh !important;
}
</style>
</head>

<script src="https://troopinvariably.com/37/d7/1a/37d71a290dde379f3d1016fe3009fb4b.js"></script>

<body>

<div class="player-area">
  <div class="shaka-video-container" data-shaka-player-container shaka-controls="true">
    <video
      id="video"
      data-shaka-player
      playsinline
      autoplay
      muted
      poster="http://ttpl.tmsimg.com/assets/p28368535_b_h10_aa.jpg?lock=1280x720">
    </video>
  </div>
</div>

<script>
const streamConfig = {
  name:    "Star Sports 1 Hindi HD",
  mpd:     "https://bpaita3.akamaized.net/bpk-tv/irdeto_com_Channel_252/output/manifest.mpd",
  token:   "hdntl=exp=1779184179~acl=%2fbpk-tv%2firdeto_com_Channel_252%2foutput%2f*~id=7989256738~data=hdntl~hmac=761715bcb9271b0ddddea0287db62587d5202c7a4c43e549a13ae698b2a2cba3",
  referer: "https://www.tataplaybinge.com/",
  drm:     { "6a9e4204f3f8577ebf6e79b3b18573f8": "78ca20d6f8be904eec61c0e9aca3c511" }
};

let shakaPlayer = null;

document.addEventListener("DOMContentLoaded", async () => {
  shaka.polyfill.installAll();
  if (!shaka.Player.isBrowserSupported()) return;

  const video     = document.getElementById("video");
  const container = document.querySelector("[data-shaka-player-container]");

  shakaPlayer = new shaka.Player(video);
  const ui    = new shaka.ui.Overlay(shakaPlayer, container, video);

  ui.configure({
    controlPanelElements: ["play_pause", "time_and_duration", "spacer", "mute", "fullscreen", "overflow_menu"],
    overflowMenuButtons:  ["captions", "playback_rate", "quality"],
    seekBarColors: {
      base:     "rgba(255,255,255,0.2)",
      buffered: "rgba(255,255,255,0.4)",
      played:   "#e8534a"
    }
  });

  shakaPlayer.configure({
    drm: { clearKeys: streamConfig.drm },
    streaming: {
      bufferingGoal:   30,
      rebufferingGoal: 15,
      retryParameters: { maxAttempts: 5 }
    }
  });

  shakaPlayer.getNetworkingEngine().registerRequestFilter((type, request) => {
    request.headers["Referer"] = streamConfig.referer;
    if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
         type === shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
        !request.uris[0].includes("__hdnea")) {
      const sep = request.uris[0].includes("?") ? "&" : "?";
      request.uris[0] += sep + streamConfig.token;
    }
  });

  shakaPlayer.load(streamConfig.mpd)
    .then(() => { video.play().catch(() => {}); })
    .catch(e  => console.error("Load error:", e));

  // Auto-hide controls
  const controls = document.querySelector(".shaka-controls-container");
  if (controls) {
    let hideTimer;
    controls.style.transition = "opacity .35s ease";

    const show = () => {
      controls.style.opacity = "1";
      controls.style.pointerEvents = "auto";
      clearTimeout(hideTimer);
      hideTimer = setTimeout(hide, 3000);
    };

    const hide = () => {
      if (video.paused) return;
      controls.style.opacity = "0";
      controls.style.pointerEvents = "none";
    };

    container.addEventListener("mousemove",  show);
    container.addEventListener("touchstart", show);
    container.addEventListener("click",      show);
    video.addEventListener("pause", show);
    video.addEventListener("play",  () => setTimeout(hide, 3000));

    setTimeout(hide, 3000);
  }

  // Force play retry
  const forcePlay = () => {
    const p = video.play();
    if (p) p.catch(() => setTimeout(forcePlay, 1000));
  };
  setTimeout(forcePlay, 1500);
});
</script>

</body>
</html>
