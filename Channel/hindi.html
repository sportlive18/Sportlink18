<!DOCTYPE html>
<html lang="en">
<head>
  <title>Fox Cricket</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="referrer" content="no-referrer"/>
  
  <!-- Plyr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css"/>

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Plyr JS -->
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>

  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    html, body {
      height: 100%;
      width: 100%;
    }
    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    .plyr {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <video autoplay playsinline muted id="player" controls preload="metadata"></video>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const video = document.getElementById("player");
      const source = "https://eus23.playlist.live-video.net/v1/playlist/CrcFtEzp-30RRxFljAW3selXFZpYuCa8khLd9Wo5HfwiUXiZqmmeumoFt18QzqKEYsCyXngJ9wT9D7N7o7VdZEPjfZhYHeQgNWlpWPI2XqnvJM3meBPexftq6rhmXJ9Rcp52Af2Myso4lAtekZpUONE5_QvY_x95KN1rxVjaNYo3ZW87X2CrN4L5mHq9gJH0PKzs8Wk9_5vOekHgE3SdTqt5Vs_mpXtMfuCmy0GSkzd3NmJJdfiuq7iNkXuGLr4Ue22wzC_LLUJHJr-1CvzoFDGg6F1OqoYsw1UP9RF59XGVlfsbdgNuM1NepGEVISJPqCKdB1krg9BXMv0y4xfsmVoV43B9Ytpsa4LYRUFfVszXu4A3kqH6mOs1GRhTiKQ7Ls6cVxm6Icp-LuKImkpZuYpcT_tGLksUjK0jQ3Rf1RJXvi-Gmj8m5KNwfacjbSGvvGl19_Amx0EW7tIhboh0xy0ZLzZJOKMq2hzj_M17Hp0HhbMsR5kbVsj96l07iV4-NTkE8S0SUo7HQFxsKZomy9ZTVd2BMePi-yKVRememedaaUgVUculqSedNZADVonQGff0HP28ogj4yR29MsrUWIsBDfm2phpndOjyaoijuZCKycE88Ze72EcMgzKs8wxXnr1rQwFG2heVB9lDxX2LuLj9PNDk_7eeAa0DNfj5paRqbBdE2dJVy_CM9QiZLv7_wjBAW1w8PRUgMF65KJ92GVnV7H1EJQf1Tk5vz0p4J04TD577k2TPLHGeCrqVn30uikZynvYi3ncej9VJSDsvUgDNAv4HxkJf2Y7ytMxErqPt-xIdIZVeoqcNDH2vCBcWa8C208OaKCH4P0tzt_gQCxXgxQLuGaq2sOkytnv4fDuZqijqlbi3T-qABrAA5OZb6Gan8byzRlTlpAVH-MpMYyITgrnPVn92NOkaDCFnkI-CSNCPrJC6OSABKglldS13ZXN0LTIw9g4.m3u8";

      const defaultOptions = {
        autoplay: true,
        controls: [
          'play', 'rewind', 'fast-forward', 'progress', 'current-time',
          'mute', 'volume', 'settings', 'fullscreen'
        ],
        settings: ['quality']
      };

      let player;

      function setupPlayer(hls, qualities = []) {
        player = new Plyr(video, {
          ...defaultOptions,
          quality: qualities.length ? {
            default: qualities[0],
            options: qualities,
            forced: true,
            onChange: q => {
              hls.levels.forEach((level, index) => {
                if (level.height === q) {
                  hls.currentLevel = index;
                }
              });
            }
          } : {}
        });

        // 🔁 AUTO RESUME
        setInterval(() => {
          if (video.paused && video.readyState > 2) {
            video.play().catch(()=>{});
          }
        }, 3000);

        // 🔊 AUTO UNMUTE (on first interaction)
        const unmute = () => {
          video.muted = false;
          video.volume = 1;
          document.removeEventListener("click", unmute);
          document.removeEventListener("touchstart", unmute);
        };

        document.addEventListener("click", unmute);
        document.addEventListener("touchstart", unmute);
      }

      if (Hls.isSupported()) {
        const hls = new Hls({
          autoStartLoad: true
        });

        hls.loadSource(source);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
          const availableQualities = data.levels.map(l => l.height).sort((a,b) => b - a);
          video.play().catch(()=>{});
          setupPlayer(hls, availableQualities);
        });

        // 🔥 AUTO RECOVER ON ERROR
        hls.on(Hls.Events.ERROR, function (_, data) {
          if (data.fatal) {
            hls.startLoad();
          }
        });

      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = source;
        video.addEventListener("loadedmetadata", () => {
          video.play().catch(()=>{});
          setupPlayer(null);
        });
      }
    });
  </script>
</body>
</html>
