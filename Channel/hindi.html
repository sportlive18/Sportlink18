<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Star Sports // Live</title>
<meta name="referrer" content="no-referrer"/>

<!-- Shaka Player -->
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.compiled.min.js"></script>

<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:#000;
    overflow:hidden;
    font-family:'Segoe UI', system-ui, sans-serif;
    user-select:none;
  }

  /* ── Video Wrapper ── */
  #wrap {
    position:fixed; inset:0;
    background:#000;
    display:flex; align-items:center; justify-content:center;
  }

  video {
    width:100%; height:100%;
    object-fit:contain;
    background:#000;
    display:block;
  }

  /* ── Controls Overlay ── */
  #controls {
    position:absolute;
    bottom:0; left:0; right:0;
    padding:0 12px 10px;
    background:linear-gradient(transparent, rgba(0,0,0,0.75) 60%);
    opacity:0;
    transition:opacity .25s ease;
    z-index:10;
  }
  #wrap:hover #controls,
  #wrap.show-controls #controls { opacity:1; }

  /* ── Progress Bar ── */
  .progress-bar-wrap {
    width:100%;
    height:4px;
    background:rgba(255,255,255,0.25);
    border-radius:2px;
    margin-bottom:10px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
  }
  .progress-bar-wrap::after {
    content:'LIVE';
    position:absolute;
    right:0; top:-18px;
    font-size:10px;
    font-weight:700;
    color:#fff;
    background:#e50000;
    padding:2px 6px;
    border-radius:3px;
    letter-spacing:.5px;
  }
  #progress-buffered {
    position:absolute; left:0; top:0; height:100%;
    background:rgba(255,255,255,0.4);
    border-radius:2px;
    width:0%; transition:width .3s;
  }
  #progress-played {
    position:absolute; left:0; top:0; height:100%;
    background:#00b2ff;
    border-radius:2px;
    width:0%;
  }

  /* ── Bottom Row ── */
  .ctrl-row {
    display:flex;
    align-items:center;
    gap:6px;
  }

  /* ── Buttons ── */
  .ctrl-btn {
    background:none; border:none;
    color:#fff; cursor:pointer;
    width:36px; height:36px;
    display:flex; align-items:center; justify-content:center;
    border-radius:6px;
    transition:background .15s;
    flex-shrink:0;
    padding:0;
  }
  .ctrl-btn:hover { background:rgba(255,255,255,0.15); }
  .ctrl-btn svg { width:20px; height:20px; fill:#fff; }

  /* ── Volume ── */
  #vol-wrap {
    display:flex; align-items:center; gap:6px;
  }
  #vol-slider {
    -webkit-appearance:none;
    width:70px; height:3px;
    border-radius:2px;
    background:rgba(255,255,255,0.3);
    outline:none; cursor:pointer;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance:none;
    width:13px; height:13px;
    border-radius:50%;
    background:#fff;
    cursor:pointer;
    box-shadow:0 0 3px rgba(0,0,0,0.5);
  }

  /* ── Time / Live Badge ── */
  .live-badge {
    font-size:11px; font-weight:700;
    color:#fff; background:#e50000;
    padding:3px 8px; border-radius:4px;
    letter-spacing:.5px;
    flex-shrink:0;
  }

  /* ── Spacer ── */
  .spacer { flex:1; }

  /* ── Quality Menu ── */
  #quality-wrap { position:relative; }
  #quality-btn { font-size:12px; font-weight:600; width:auto; padding:0 8px; gap:4px; }
  #quality-menu {
    display:none;
    position:absolute;
    bottom:calc(100% + 8px); right:0;
    background:rgba(20,20,20,0.95);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:8px;
    overflow:hidden;
    min-width:110px;
    box-shadow:0 8px 24px rgba(0,0,0,0.6);
    z-index:20;
  }
  #quality-menu.open { display:block; }
  #quality-menu button {
    display:block; width:100%;
    background:none; border:none;
    color:rgba(255,255,255,0.8);
    padding:9px 14px;
    text-align:left; font-size:13px; cursor:pointer;
    transition:background .12s;
  }
  #quality-menu button:hover,
  #quality-menu button.active { background:rgba(255,255,255,0.1); color:#fff; }

  /* ── Big Play Button ── */
  #big-play {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:9; pointer-events:none; opacity:0;
    transition:opacity .2s;
  }
  #big-play.show { opacity:1; pointer-events:auto; }
  #big-play-btn {
    width:72px; height:72px;
    background:rgba(0,0,0,0.55);
    border:2px solid rgba(255,255,255,0.7);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; backdrop-filter:blur(4px);
    transition:transform .15s, background .15s;
  }
  #big-play-btn:hover { transform:scale(1.08); background:rgba(0,0,0,0.75); }
  #big-play-btn svg { width:28px; height:28px; fill:#fff; margin-left:4px; }

  /* ── Spinner / Buffering ── */
  #spinner {
    position:absolute; inset:0;
    display:none; align-items:center; justify-content:center;
    z-index:8; pointer-events:none;
  }
  #spinner.show { display:flex; }
  .spin-ring {
    width:44px; height:44px;
    border:3px solid rgba(255,255,255,0.2);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── Block Overlay ── */
  .block-overlay {
    position:fixed; inset:0; z-index:99999;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at center,#1a1a1a 0%,#000 100%);
    text-align:center;
  }
  .block-box {
    padding:40px; max-width:500px; width:90%;
    background:rgba(20,20,20,0.95);
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
    animation:fadeUp .6s ease-out;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(30px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .block-title {
    font-size:38px; font-weight:800; color:#fff;
    text-transform:uppercase; letter-spacing:2px;
    margin-bottom:16px;
    text-shadow:0 0 10px rgba(255,0,0,0.3);
  }
  .block-sub {
    font-size:14px; color:rgba(255,255,255,0.6); line-height:1.6;
  }

  @media(max-width:600px){
    #vol-slider { width:50px; }
    .block-title { font-size:26px; }
    .block-box { padding:24px; }
  }
</style>
</head>
<body>

<div id="wrap">
  <video id="video" autoplay muted playsinline preload="metadata"></video>

  <!-- Spinner -->
  <div id="spinner"><div class="spin-ring"></div></div>

  <!-- Big Play -->
  <div id="big-play">
    <div id="big-play-btn">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <!-- Progress -->
    <div class="progress-bar-wrap" id="prog-wrap">
      <div id="progress-buffered"></div>
      <div id="progress-played"></div>
    </div>

    <!-- Bottom Row -->
    <div class="ctrl-row">

      <!-- Play/Pause -->
      <button class="ctrl-btn" id="btn-play" title="Play/Pause">
        <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>

      <!-- Volume -->
      <div id="vol-wrap">
        <button class="ctrl-btn" id="btn-mute" title="Mute/Unmute">
          <svg id="icon-vol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          <svg id="icon-muted" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 19l1.73 1.73L21 19.46 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        </button>
        <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="1">
      </div>

      <!-- Live Badge -->
      <span class="live-badge">● LIVE</span>

      <div class="spacer"></div>

      <!-- Quality -->
      <div id="quality-wrap">
        <button class="ctrl-btn" id="quality-btn" title="Quality">
          <svg viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M19.59 7L12 19 4.41 7z"/></svg>
          <span id="quality-label">AUTO</span>
        </button>
        <div id="quality-menu"></div>
      </div>

      <!-- PiP -->
      <button class="ctrl-btn" id="btn-pip" title="Picture in Picture">
        <svg viewBox="0 0 24 24"><path d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3c-1.1 0-2 .88-2 1.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V4.97h18v14.05z"/></svg>
      </button>

      <!-- Fullscreen -->
      <button class="ctrl-btn" id="btn-fs" title="Fullscreen">
        <svg id="icon-fs" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        <svg id="icon-exit-fs" viewBox="0 0 24 24" style="display:none"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
      </button>

    </div>
  </div>
</div>

<script>
(function(){

  /* ── Sandbox blocker ── */
  function isSandboxedEnv(){
    try{
      if(window.self===window.top) return false;
      if(window.frameElement&&window.frameElement.hasAttribute("sandbox")) return true;
      try{
        document.domain=document.domain;
        if(window.frameElement&&!window.frameElement.getAttribute("sandbox")) return false;
      }catch(e){ return true; }
      return false;
    }catch(e){ return true; }
  }

  function triggerBlockScreen(title, msg){
    document.getElementById("wrap").style.display="none";
    const o=document.createElement("div"); o.className="block-overlay";
    o.innerHTML=`<div class="block-box"><div class="block-title">${title}</div><div class="block-sub">${msg}</div></div>`;
    document.body.appendChild(o);
  }

  if(isSandboxedEnv()){
    triggerBlockScreen("Disable Sandbox","Open in Chrome Browser & Disable Ad Blocker");
    return;
  }

  /* ── CONFIG ── */
  const CONFIG={
    streamUrl:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd",
    keyId:"400131994b445d8c8817202248760fda",
    key:"2d56cb6f07a75b9aff165d534ae2bfc4",
    cookieUrl:"https://allrounder-live2.pages.dev/api/star-1-hindi.json"
  };

  /* ── DOM refs ── */
  const wrap       = document.getElementById("wrap");
  const video      = document.getElementById("video");
  const spinner    = document.getElementById("spinner");
  const bigPlay    = document.getElementById("big-play");
  const bigPlayBtn = document.getElementById("big-play-btn");
  const btnPlay    = document.getElementById("btn-play");
  const iconPlay   = document.getElementById("icon-play");
  const iconPause  = document.getElementById("icon-pause");
  const btnMute    = document.getElementById("btn-mute");
  const iconVol    = document.getElementById("icon-vol");
  const iconMuted  = document.getElementById("icon-muted");
  const volSlider  = document.getElementById("vol-slider");
  const btnPip     = document.getElementById("btn-pip");
  const btnFs      = document.getElementById("btn-fs");
  const iconFs     = document.getElementById("icon-fs");
  const iconExitFs = document.getElementById("icon-exit-fs");
  const qualityBtn = document.getElementById("quality-btn");
  const qualityMenu= document.getElementById("quality-menu");
  const qualityLbl = document.getElementById("quality-label");
  const progBuf    = document.getElementById("progress-buffered");
  const progPlay   = document.getElementById("progress-played");

  let hideTimer;

  /* ── Auto-hide controls ── */
  function showControls(){
    wrap.classList.add("show-controls");
    clearTimeout(hideTimer);
    hideTimer = setTimeout(()=>wrap.classList.remove("show-controls"), 3000);
  }
  wrap.addEventListener("mousemove", showControls);
  wrap.addEventListener("touchstart", showControls);

  /* ── Progress update ── */
  function updateProgress(){
    if(!video.duration || isNaN(video.duration)) return;
    const pct = (video.currentTime / video.duration)*100;
    progPlay.style.width = pct+"%";
    if(video.buffered.length){
      const bpct = (video.buffered.end(video.buffered.length-1)/video.duration)*100;
      progBuf.style.width = bpct+"%";
    }
  }
  video.addEventListener("timeupdate", updateProgress);

  /* ── Play / Pause ── */
  function syncPlayIcon(){
    const paused = video.paused;
    iconPlay.style.display  = paused ? "" : "none";
    iconPause.style.display = paused ? "none" : "";
    bigPlay.classList.toggle("show", paused);
  }
  video.addEventListener("play",  syncPlayIcon);
  video.addEventListener("pause", syncPlayIcon);

  btnPlay.addEventListener("click", ()=>{
    video.paused ? video.play().catch(()=>{}) : video.pause();
  });
  bigPlayBtn.addEventListener("click", ()=>{
    video.play().catch(()=>{});
  });

  /* ── Mute / Volume ── */
  function syncMuteIcon(){
    const muted = video.muted || video.volume===0;
    iconVol.style.display   = muted ? "none" : "";
    iconMuted.style.display = muted ? "" : "none";
    volSlider.value = muted ? 0 : video.volume;
  }
  btnMute.addEventListener("click", ()=>{
    video.muted = !video.muted;
    syncMuteIcon();
  });
  volSlider.addEventListener("input", ()=>{
    video.volume = parseFloat(volSlider.value);
    video.muted  = video.volume===0;
    syncMuteIcon();
  });

  /* ── Spinner ── */
  video.addEventListener("waiting",  ()=>spinner.classList.add("show"));
  video.addEventListener("canplay",  ()=>spinner.classList.remove("show"));
  video.addEventListener("playing",  ()=>spinner.classList.remove("show"));
  spinner.classList.add("show");

  /* ── PiP ── */
  btnPip.addEventListener("click", ()=>{
    if(document.pictureInPictureElement) document.exitPictureInPicture().catch(()=>{});
    else video.requestPictureInPicture().catch(()=>{});
  });

  /* ── Fullscreen ── */
  function syncFsIcon(){
    const isFs = !!(document.fullscreenElement||document.webkitFullscreenElement);
    iconFs.style.display     = isFs ? "none" : "";
    iconExitFs.style.display = isFs ? "" : "none";
  }
  btnFs.addEventListener("click", ()=>{
    if(!document.fullscreenElement && !document.webkitFullscreenElement){
      (wrap.requestFullscreen||wrap.webkitRequestFullscreen).call(wrap).catch(()=>{});
    } else {
      (document.exitFullscreen||document.webkitExitFullscreen).call(document).catch(()=>{});
    }
  });
  document.addEventListener("fullscreenchange",       syncFsIcon);
  document.addEventListener("webkitfullscreenchange", syncFsIcon);

  /* ── Quality Menu ── */
  qualityBtn.addEventListener("click", (e)=>{
    e.stopPropagation();
    qualityMenu.classList.toggle("open");
  });
  document.addEventListener("click", ()=>qualityMenu.classList.remove("open"));

  function buildQualityMenu(player){
    const tracks = player.getVariantTracks();
    const heights = [...new Set(tracks.map(t=>t.height).filter(Boolean))].sort((a,b)=>b-a);
    qualityMenu.innerHTML="";
    const autoBtn = document.createElement("button");
    autoBtn.textContent="Auto"; autoBtn.className="active";
    autoBtn.addEventListener("click",()=>{
      player.configure({abr:{enabled:true}});
      qualityLbl.textContent="AUTO";
      qualityMenu.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
      autoBtn.classList.add("active");
      qualityMenu.classList.remove("open");
    });
    qualityMenu.appendChild(autoBtn);
    heights.forEach(h=>{
      const btn=document.createElement("button");
      btn.textContent=h+"p";
      btn.addEventListener("click",()=>{
        const target=tracks.filter(t=>t.height===h).sort((a,b)=>b.bandwidth-a.bandwidth)[0];
        if(target){
          player.configure({abr:{enabled:false}});
          player.selectVariantTrack(target,true);
          qualityLbl.textContent=h+"p";
          qualityMenu.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
          btn.classList.add("active");
        }
        qualityMenu.classList.remove("open");
      });
      qualityMenu.appendChild(btn);
    });
  }

  /* ── Auto-resume ── */
  setInterval(()=>{
    if(video.paused && video.readyState>2) video.play().catch(()=>{});
  }, 3000);

  /* ── Auto-unmute on first interaction ── */
  const unmute=()=>{
    video.muted=false; video.volume=1; syncMuteIcon();
    document.removeEventListener("click",     unmute);
    document.removeEventListener("touchstart", unmute);
  };
  document.addEventListener("click",     unmute);
  document.addEventListener("touchstart", unmute);

  /* ── Shaka init ── */
  document.addEventListener("DOMContentLoaded", async ()=>{

    shaka.polyfill.installAll();
    if(!shaka.Player.isBrowserSupported()) return;

    video.muted=true;

    const player=new shaka.Player();
    await player.attach(video);

    player.configure({
      drm:{ clearKeys:{ [CONFIG.keyId]:CONFIG.key } },
      manifest:{ defaultPresentationDelay:5 },
      streaming:{
        lowLatencyMode:true,
        bufferingGoal:10,
        rebufferingGoal:2,
        safeSeekOffset:5
      }
    });

    /* ── Cookie fetch ── */
    let cookieValue="";
    try{
      const resp=await fetch(CONFIG.cookieUrl,{cache:"no-store"});
      const data=await resp.json();
      cookieValue=data.cookie||"";
    }catch(e){}

    if(cookieValue){
      player.getNetworkingEngine().registerRequestFilter((type,request)=>{
        request.headers["Referer"]    ="https://www.jiotv.com/";
        request.headers["User-Agent"] ="plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
        request.headers["Cookie"]     =cookieValue;
        let urlCookie=cookieValue.startsWith("__hdnea__=")?cookieValue.substring(10):cookieValue;
        if(
          (type===shaka.net.NetworkingEngine.RequestType.MANIFEST||
           type===shaka.net.NetworkingEngine.RequestType.SEGMENT)&&
          !request.uris[0].includes("__hdnea__")
        ){
          const sep=request.uris[0].includes("?")?"&":"?";
          request.uris[0]+=sep+"__hdnea__="+urlCookie;
        }
      });
    }

    try{
      await player.load(CONFIG.streamUrl);
      video.play().catch(()=>{});
      buildQualityMenu(player);
    }catch(e){ console.warn("Load error:",e); }

    /* ── Error recovery ── */
    player.addEventListener("error", ()=>{
      setTimeout(async()=>{
        try{ await player.load(CONFIG.streamUrl); video.play().catch(()=>{}); }catch(e){}
      },3000);
    });

  });

})();
</script>
</body>
</html>
