<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPORTLINK | Live Stream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --jio: #005bea;
            --jio-dark: #00234a;
            --hot: #ff3d3d;
            --gold: #ffd700;
            --bg: #03060f;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --green: #1eda6f;
            --text: #e8eaf0;
            --sub: rgba(232,234,240,0.5);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ─── NOISE TEXTURE OVERLAY ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* ─── AMBIENT GLOW ─── */
        .ambient {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
        }
        .ambient-1 {
            width: 500px; height: 300px;
            background: rgba(0, 91, 234, 0.12);
            top: -100px; left: -100px;
            animation: drift1 8s ease-in-out infinite alternate;
        }
        .ambient-2 {
            width: 400px; height: 400px;
            background: rgba(255, 61, 61, 0.08);
            bottom: -80px; right: -80px;
            animation: drift2 10s ease-in-out infinite alternate;
        }
        @keyframes drift1 { to { transform: translate(60px, 40px); } }
        @keyframes drift2 { to { transform: translate(-50px, -30px); } }

        /* ─── HEADER ─── */
        header {
            position: relative;
            z-index: 50;
            height: 56px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(3,6,15,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .logo-badge {
            background: linear-gradient(135deg, var(--jio), #0085ff);
            padding: 4px 10px;
            border-radius: 6px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.15rem;
            letter-spacing: 1px;
            color: white;
        }

        .logo-star {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.15rem;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--hot), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* LIVE BADGE */
        .live-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,61,61,0.15);
            border: 1px solid rgba(255,61,61,0.35);
            border-radius: 100px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--hot);
            text-transform: uppercase;
        }

        .live-dot {
            width: 7px; height: 7px;
            background: var(--hot);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--hot);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.75); }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* WHATSAPP BUTTON */
        .wa-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            background: linear-gradient(135deg, #1eda6f, #0fb855);
            color: white;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 7px 14px;
            border-radius: 100px;
            box-shadow: 0 4px 16px rgba(30,218,111,0.25);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: float-wa 4s ease-in-out infinite;
        }

        .wa-btn:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 8px 24px rgba(30,218,111,0.35);
        }

        @keyframes float-wa {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .wa-icon {
            width: 16px; height: 16px;
            fill: white;
        }

        /* ─── PLAYER AREA ─── */
        #player-wrapper {
            flex: 1;
            position: relative;
            z-index: 1;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Cinematic letterbox shimmer during load */
        .loader-screen {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 10;
            animation: fadeOut 0.6s ease 1.8s forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; pointer-events: none; }
        }

        .loader-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            letter-spacing: 4px;
            animation: scalePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
        }

        .loader-logo span {
            background: linear-gradient(90deg, var(--hot), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes scalePop {
            from { opacity: 0; transform: scale(0.7); }
            to { opacity: 1; transform: scale(1); }
        }

        .loader-bar {
            width: 200px;
            height: 3px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .loader-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--jio), var(--hot));
            border-radius: 10px;
            animation: fill-bar 1.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fill-bar {
            from { width: 0%; }
            to { width: 100%; }
        }

        .loader-text {
            font-size: 0.75rem;
            color: var(--sub);
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ─── TOUCH RIPPLE ─── */
        @keyframes ripple {
            from { transform: scale(0); opacity: 0.4; }
            to   { transform: scale(4); opacity: 0; }
        }
        .ripple-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            width: 60px; height: 60px;
            pointer-events: none;
            animation: ripple 0.6s ease-out forwards;
            transform-origin: center;
            z-index: 20;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 480px) {
            .wa-btn span { display: none; }
            .wa-btn { padding: 8px; }
            .logo-badge { font-size: 1rem; }
            .logo-star { font-size: 1rem; }
        }
    </style>
</head>
<body>

<!-- Ambient lighting -->
<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>

<!-- Header -->
<header>
    <div class="logo">
        <div class="logo-badge">JIO</div>
        <div class="logo-star">HOTSTAR</div>
    </div>

    <div class="live-pill">
        <div class="live-dot"></div>
        LIVE
    </div>

    <div class="header-right">
        <a href="https://www.whatsapp.com/channel/0029VbC2oQsC6ZvmwpR3v73v" target="_blank" class="wa-btn">
            <svg class="wa-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            <span>JOIN CHANNEL</span>
        </a>
    </div>
</header>

<!-- Player -->
<main id="player-wrapper">
    <!-- Cinematic Loader -->
    <div class="loader-screen" id="loader">
        <div class="loader-logo">JIO<span>HOTSTAR</span></div>
        <div class="loader-bar"><div class="loader-fill"></div></div>
        <div class="loader-text">Starting Stream…</div>
    </div>

    <iframe
        id="video-frame"
        src="https://matcheslinkz.pages.dev/ios?id=hindi"
        allow="autoplay; encrypted-media; picture-in-picture"
        loading="eager">
    </iframe>
</main>

<script>
    window.addEventListener('load', () => {
        setTimeout(() => {
            const loader = document.getElementById('loader');
            if (loader) loader.remove();
        }, 2500);
    });

    // Touch ripple effect
    document.getElementById('player-wrapper').addEventListener('click', function(e) {
        const ripple = document.createElement('div');
        ripple.classList.add('ripple-circle');
        const rect = this.getBoundingClientRect();
        ripple.style.left = (e.clientX - rect.left - 30) + 'px';
        ripple.style.top = (e.clientY - rect.top - 30) + 'px';
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 700);
    });
</script>
</body>
</html>
