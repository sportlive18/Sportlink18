<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arsenal vs Sporting</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #EF0107;
      --gold:   #9BFF00;
      --dark:   #0a0a0a;
      --mid:    #161616;
      --border: rgba(255,255,255,0.07);
    }

    body {
      background: var(--dark);
      color: #fff;
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── TOP BAR ── */
    .topbar {
      width: 100%;
      background: var(--red);
      text-align: center;
      padding: 6px 0;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #fff;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      max-width: 960px;
      padding: 40px 20px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .badge {
      display: inline-block;
      background: var(--red);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 2px;
    }

    .matchup {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 9vw, 90px);
      letter-spacing: 2px;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .team-ars { color: #fff; }
    .team-spo { color: #fff; }

    .vs {
      font-size: clamp(22px, 4vw, 40px);
      color: var(--gold);
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 4px;
    }

    .meta {
      font-size: 13px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
    }

    /* ── LIVE PILL ── */
    .live-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(239,1,7,0.15);
      border: 1px solid var(--red);
      border-radius: 30px;
      padding: 5px 16px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--red);
    }

    .live-dot {
      width: 8px; height: 8px;
      background: var(--red);
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── PLAYER WRAPPER ── */
    .player-shell {
      width: 100%;
      max-width: 960px;
      padding: 0 20px 40px;
    }

    .player-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 0 60px rgba(239,1,7,0.15), 0 8px 40px rgba(0,0,0,0.8);
    }

    .player-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* decorative corner accents */
    .player-frame::before,
    .player-frame::after {
      content: '';
      position: absolute;
      z-index: 10;
      pointer-events: none;
      width: 24px; height: 24px;
      border-color: var(--red);
      border-style: solid;
    }
    .player-frame::before { top: 0; left: 0;  border-width: 2px 0 0 2px; }
    .player-frame::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

    /* ── FOOTER ── */
    footer {
      margin-top: auto;
      padding: 18px;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="topbar">UEFA Champions League &nbsp;·&nbsp; Live Stream</div>

  <header>
    <span class="badge">Now Playing</span>
    <div class="matchup">
      <span class="team-ars">Arsenal</span>
      <span class="vs">VS</span>
      <span class="team-spo">Sporting</span>
    </div>
    <div class="meta">UEFA Champions League &nbsp;·&nbsp; Quarter-Final</div>
    <div class="live-pill"><span class="live-dot"></span> Live</div>
  </header>

  <div class="player-shell">
    <div class="player-frame">
      <iframe
        src="https://allinonereborn.online/events/player.html?url=https%3A%2F%2Fmini.allinonereborn.fun%2Fevents%2Fstream_proxy.php%3Furl%3Dhttps%3A%2F%2Fsonydaimenew.akamaized.net%2Fhls%2Flive%2F2018457%2FArsenal_1504%2FHIN%2Fstd_lrh-800300010.m3u8%3Fhdnea%3Dexp%3D1776321722~acl%3D%2F*~id%3D68057223255993567204567890459136~hmac%3D102b7418a252428ac286a92bcaae80a26503dee7eb283eeb9752b92adab43d4a"
        allowfullscreen
        allow="autoplay; encrypted-media; fullscreen"
        scrolling="no"
      ></iframe>
    </div>
  </div>

  <footer>Stream · Arsenal vs Sporting · HD</footer>

</body>
</html>
