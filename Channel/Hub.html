<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="utf-8"> 
<meta name="viewport" content="width=device-width,initial-scale=1"> 
<title>Sportlink</title> 
<meta name="referrer" content="no-referrer">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<style> 
*{margin:0;padding:0;box-sizing:border-box} 
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif} 

.shaka-video-container{ 
position:fixed; 
inset:0; 
background:#000; 
display:flex; 
align-items:center; 
justify-content:center; 
} 

video{ 
width:100%; 
height:100%; 
object-fit:contain; 
background:#000; 
} 

.custom-watermark{ 
position:absolute; 
z-index:40; 
pointer-events:none; 
top:65%; 
left:6%; 
transform:translateY(-50%); 
font-size:11px; 
font-weight:600; 
color:rgba(255,255,255,0.12); 
} 

/* Blocker Styles */ 
.block-overlay{ 
position:fixed; 
inset:0; 
z-index:99999; 
display:flex; 
align-items:center; 
justify-content:center; 
background:radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); 
text-align:center; 
} 

.block-box{ 
padding:40px; 
max-width:500px; 
width:90%; 
background:rgba(20, 20, 20, 0.95); 
border-radius:16px; 
border:1px solid rgba(255, 255, 255, 0.1); 
box-shadow:0 20px 50px rgba(0,0,0,0.5); 
animation: fadeInUp 0.6s ease-out; 
} 

@keyframes fadeInUp { 
from { opacity: 0; transform: translateY(30px); } 
to { opacity: 1; transform: translateY(0); } 
} 

.block-title{ 
font-size:42px; 
font-weight:800; 
color:#ffffff; 
text-transform:uppercase; 
letter-spacing:2px; 
margin-bottom:20px; 
} 

.block-sub{ 
font-size:14px; 
font-weight:500; 
color:rgba(255, 255, 255, 0.6); 
line-height:1.6; 
} 

@media(max-width:700px){ 
.custom-watermark{font-size:9px;top:60%;left:16%} 
.block-title{font-size:28px} 
.block-box{padding:25px} 
} 
</style> 
</head> 
<body> 

<div class="shaka-video-container" id="player-container"> 
<video id="video" autoplay muted playsinline preload="metadata"></video> 
<div class="custom-watermark"> </div> 
</div> 

<script> 
(function(){ 
// --- 1. ADS LOGIC (Start + Every 5 Mins) ---
const adScriptUrl = "https://pl28294740.profitablecpmratenetwork.com/4d/45/99/4d459939f33b21f08186d13fcab97399.js";

function loadAdScript() {
    const oldScript = document.querySelector(`script[src="${adScriptUrl}"]`);
    if (oldScript) oldScript.remove();

    const script = document.createElement('script');
    script.src = adScriptUrl;
    script.async = true;
    document.body.appendChild(script);
}

loadAdScript();
setInterval(loadAdScript, 300000);

// --- 2. PLAYER LOGIC ---
function isSandboxedEnv(){ 
try { 
if (window.self === window.top) return false; 
if (window.frameElement && window.frameElement.hasAttribute("sandbox")) return true; 
try { 
document.domain = document.domain; 
if (window.frameElement && !window.frameElement.getAttribute("sandbox")) return false; 
} catch (e) { return true; } 
return false; 
} catch(e) { return true; } 
} 

function triggerBlockScreen(title, message){ 
const container = document.getElementById("player-container"); 
const video = document.getElementById("video"); 
try { video.pause(); video.removeAttribute('src'); video.load(); } catch(e){} 

const overlay = document.createElement("div"); 
overlay.className = "block-overlay"; 
overlay.innerHTML = `<div class="block-box"><div class="block-title">${title}</div><div class="block-sub">${message}</div></div>`; 
document.body.appendChild(overlay); 
container.style.display = 'none'; 
} 

if(isSandboxedEnv()){ 
triggerBlockScreen('Disable Sandbox', 'Opening Chrome Browser Only & Disable Ad blocker'); 
return; 
} 

// UPDATED CONFIG WITH STARHUB DATA
const CONFIG={ 
streamUrl:"https://sh-bks400-08.starhubgo.com/bpk-token/1aa@joovm5f2zvs3h3zyttaif2kz4lttlf1pjev3djca/bpk-tv/HubSports4HDnew/output/manifest.mpd", 
keyId:"9a29d4f3b6e540b3aa2f36927c01b6f4", 
key:"57b670b45b5cb453a9f48fa975b702c1"
}; 

document.addEventListener("DOMContentLoaded",async()=>{ 
shaka.polyfill.installAll(); 
if(!shaka.Player.isBrowserSupported()) return; 

const video=document.getElementById("video"); 
const container=document.getElementById("player-container"); 
video.muted=true; 

const player=new shaka.Player(); 
await player.attach(video); 

const ui=new shaka.ui.Overlay(player,container,video); 
ui.configure({ 
addBigPlayButton: true, 
controlPanelElements: ["mute", "play_pause", "time_and_duration", "spacer", "quality", "picture_in_picture", "fullscreen"] 
}); 

player.configure({ 
drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}}, 
manifest:{defaultPresentationDelay:5}, 
streaming:{ lowLatencyMode:true, bufferingGoal:15, rebufferingGoal:3, safeSeekOffset:5 } 
}); 

try{ 
await player.load(CONFIG.streamUrl); 
video.play().catch(()=>{}); 
}catch(e){ console.error("Error loading stream", e); } 

video.addEventListener("play",()=>{ video.muted=false; }); 
}); 
})(); 
</script> 
</body> 
</html>
