<!DOCTYPE html>
<html lang="en">
<head>
  <title>Fox Cricket</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="referrer" content="no-referrer"/>
  <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet"/>
  <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }
    .video-js {
      width: 100vw !important;
      height: 100vh !important;
    }
    .vjs-big-play-button {
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) !important;
    }
  </style>
</head>
<body>
  <video
    id="player"
    class="video-js vjs-default-skin vjs-big-play-centered"
    controls
    autoplay
    playsinline
    preload="auto">
  </video>

  <script>
    const src = "https://dai.google.com/linear/hls/event/mbsfWpAoS2Olw5e-nkM-gw/master.m3u8";

    const player = videojs('player', {
      autoplay: true,
      muted: true,
      liveui: true,
      html5: {
        vhs: {
          overrideNative: true,
          withCredentials: false,
          handleManifestRedirects: true,
          limitRenditionByPlayerDimensions: false,
          xhr: {
            beforeRequest: function(options) {
              options.headers = options.headers || {};
              options.headers['User-Agent'] = 'Cricbuzz/7.00.01(Linux;Android13)AndroidXMedia3/1.5.1';
              options.headers['X-Forwarded-For'] = '1.178.20.23';
              return options;
            }
          }
        },
        nativeAudioTracks: false,
        nativeVideoTracks: false
      }
    });

    player.src({
      src: src,
      type: 'application/x-mpegURL'
    });

    player.ready(function () {
      player.play().catch(() => {});
    });

    // Auto unmute on first tap/click
    const unmute = () => {
      player.muted(false);
      player.volume(1);
      document.removeEventListener('click', unmute);
      document.removeEventListener('touchstart', unmute);
    };
    document.addEventListener('click', unmute);
    document.addEventListener('touchstart', unmute);

    // Auto resume if paused
    setInterval(() => {
      if (player.paused() && player.readyState() > 2) {
        player.play().catch(() => {});
      }
    }, 3000);

    // Error recovery
    player.on('error', function() {
      setTimeout(() => {
        player.src({ src: src, type: 'application/x-mpegURL' });
        player.play().catch(() => {});
      }, 3000);
    });
  </script>
</body>
</html>
