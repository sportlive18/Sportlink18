<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportlink - Sky Sports</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0d1117;
            color: white;
        }

        header {
            background: linear-gradient(90deg, #e50914, #1e3a8a);
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .container {
            padding: 15px;
        }

        .player {
            width: 100%;
            height: 75vh;
            border: none;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
        }

        .info {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
            text-align: center;
        }

        footer {
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
            color: #888;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    Sportlink - Sky Sports
</header>

<div class="container">
    
    <iframe 
        class="player"
        src="https://allrounder-live4.pages.dev/channel/prime"
        allowfullscreen
        allow="encrypted-media; autoplay">
    </iframe>

    <div class="info">
        Live Streaming | Sky Sports Channel
    </div>

</div>

<footer>
    © 2026 Sportlink | All Rights Reserved
</footer>

</body>
</html>
