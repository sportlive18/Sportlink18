<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LIVE · QUALITY SWITCH</title>
  <!-- Shaka Player + UI -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
  <!-- Poppins font (clean) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* fullscreen reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      background: #0b0b0b;
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
    }
    .player-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }
    .shaka-video-container {
      width: 100%;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }
    /* loading overlay - hidden by default */
    .loading-overlay {
      display: none;  /* removed initial loading */
    }
  </style>
</head>
<body>
  <div class="player-wrapper">
    <div class="shaka-video-container" data-shaka-player>
      <video id="video" autoplay playsinline muted></video>
      <!-- loading indicator (hidden) -->
      <div id="loading" class="loading-overlay"></div>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ----- STREAM URL (exactly as requested) -----
      const STREAM_URL = 
        "https://bl.rutube.ru/livestream/7c13a51576b9ff2601f08f5d57dd5169/index.m3u8?s=uiXES2ePt7xTpQnbJxn7Dg&e=2074684474&scheme=https";

      // ----- DOM refs -----
      const video = document.getElementById('video');

      // ----- Shaka Player init (with UI & quality switch) -----
      async function initShaka() {
        try {
          const player = new shaka.Player(video);
          const container = document.querySelector('.shaka-video-container');
          const ui = new shaka.ui.Overlay(player, container, video);

          // UI configuration: explicitly include quality (and remove telegram)
          ui.configure({
            controlPanelElements: [
              'play_pause',
              'mute',
              'time_and_duration',
              'spacer',
              'quality',          // <-- quality switch button
              'fullscreen',
              'overflow_menu'
            ],
            addSeekBar: true,
            // keep quality in overflow menu as well (optional, but we already have it)
            overflowMenuButtons: ['picture_in_picture', 'language']
          });

          // buffering tweaks for live
          player.configure({
            streaming: {
              bufferingGoal: 8,
              rebufferingGoal: 2,
              bufferBehind: 20
            }
          });

          // load the stream
          await player.load(STREAM_URL);
          // autoplay (muted is set on video element)
          await video.play().catch(() => {
            video.muted = true;
            video.play().catch(e => console.warn('play fallback:', e));
          });

        } catch (shakaErr) {
          console.warn('Shaka load error, falling back to native HLS (if supported)', shakaErr);
          // fallback: native video + hls (only works if browser supports HLS)
          try {
            video.src = STREAM_URL;
            await video.play().catch(() => {
              video.muted = true;
              return video.play();
            });
          } catch (nativeErr) {
            console.error('Native playback also failed', nativeErr);
          }
        }
      }

      // ----- START -----
      document.addEventListener('DOMContentLoaded', function() {
        initShaka();
      });
    })();
  </script>
</body>
</html>
