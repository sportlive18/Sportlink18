<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SPORTLINK — Willow Cricbuzz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020b14;
            --surface: #061522;
            --surface2: #0a1e30;
            --accent: #00c8ff;
            --accent2: #5ee7ff;
            --accent-dim: rgba(0, 200, 255, 0.18);
            --red: #e8323a;
            --green: #00e676;
            --muted: #2e5870;
            --text: #c8e8f7;
            --text2: #5f9ab8;
            --glow: rgba(0, 200, 255, 0.22);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── BG LAYER ── */
        .bg-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .bg-layer::before {
            content: '';
            position: absolute; top: -20%; left: -10%; width: 65%; height: 65%;
            background: radial-gradient(ellipse, rgba(0,200,255,0.08) 0%, transparent 70%);
            animation: driftA 18s ease-in-out infinite alternate;
        }
        .bg-layer::after {
            content: '';
            position: absolute; bottom: -20%; right: -10%; width: 55%; height: 55%;
            background: radial-gradient(ellipse, rgba(0,80,200,0.07) 0%, transparent 70%);
            animation: driftB 22s ease-in-out infinite alternate;
        }
        @keyframes driftA { from { transform: translate(0,0) scale(1); } to { transform: translate(4%,6%) scale(1.1); } }
        @keyframes driftB { from { transform: translate(0,0) scale(1); } to { transform: translate(-5%,-4%) scale(1.08); } }

        /* Grid overlay */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(0,200,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,200,255,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        /* ── TICKER ── */
        .ticker-wrap {
            overflow: hidden;
            background: linear-gradient(90deg, #003a55, #005c7a, #003a55);
            border-bottom: 1px solid rgba(0,200,255,0.25);
            padding: 7px 0;
        }
        .ticker { display: flex; white-space: nowrap; animation: ticker 30s linear infinite; }
        .ticker span {
            color: var(--accent2); font-size: 11px; font-weight: 700;
            letter-spacing: 1.5px; padding: 0 40px; text-transform: uppercase;
        }
        .ticker span::before { content: '◆ '; opacity: 0.6; }
        @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* ── HEADER ── */
        header {
            position: relative; z-index: 10;
            padding: 18px 28px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(0,200,255,0.12);
            background: rgba(2,11,20,0.9);
            backdrop-filter: blur(16px);
        }
        .brand { display: flex; align-items: center; gap: 16px; }
        .logo-wrap { position: relative; }
        .logo {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, #00c8ff, #0066cc);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Bebas Neue', sans-serif; font-size: 20px;
            color: #020b14; letter-spacing: 1px;
            box-shadow: 0 0 24px rgba(0,200,255,0.45), 0 4px 14px rgba(0,0,0,0.7);
            transition: box-shadow 0.3s;
        }
        .logo:hover { box-shadow: 0 0 40px rgba(0,200,255,0.75), 0 4px 14px rgba(0,0,0,0.7); }

        .brand-text h1 {
            font-family: 'Bebas Neue', sans-serif; font-size: 26px;
            letter-spacing: 3px; color: #fff; line-height: 1;
        }
        .brand-text h1 span { color: var(--accent); }
        .brand-text p { font-size: 11px; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

        .live-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(232,50,58,0.12); border: 1px solid rgba(232,50,58,0.35);
            padding: 5px 12px; border-radius: 20px;
            font-size: 11px; font-weight: 700; color: #ff5a60;
            letter-spacing: 1.5px; text-transform: uppercase;
        }
        .live-dot {
            width: 7px; height: 7px; background: var(--red); border-radius: 50%;
            animation: blink 1.2s ease-in-out infinite; box-shadow: 0 0 8px var(--red);
        }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }

        /* ── PLAYER SECTION ── */
        .player-section {
            position: relative; z-index: 5;
            max-width: 1100px; margin: 32px auto; padding: 0 20px;
        }

        .player-card {
            background: var(--surface); border-radius: 18px; overflow: hidden;
            border: 1px solid rgba(0,200,255,0.12);
            box-shadow: 0 24px 64px rgba(0,0,0,0.7);
        }

        .channel-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; background: var(--surface2);
            border-bottom: 1px solid rgba(0,200,255,0.08);
        }
        .channel-label { display: flex; align-items: center; gap: 12px; }
        .channel-icon { font-size: 18px; }
        .channel-name { font-weight: 700; font-size: 15px; color: #fff; }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .video-wrapper video {
            width: 100%; height: 100%;
            background: #000;
        }

        /* ── FOOTER ── */
        footer {
            text-align: center; padding: 20px; color: var(--muted); font-size: 12px;
        }

        @media (max-width: 560px) {
            header { padding: 14px 16px; }
            .brand-text h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<div class="ticker-wrap" aria-hidden="true">
    <div class="ticker">
        <span>SPORTLINK Live</span>
        <span>HD Streaming Available</span>
        <span>Live Matches 24/7</span>
        <span>Watch on Any Device</span>
        <span>SPORTLINK Live</span>
    </div>
</div>

<header>
    <div class="brand">
        <div class="logo">SL</div>
        <div class="brand-text">
            <h1>SPORT<span>LINK</span></h1>
            <p>Live Stream Hub</p>
        </div>
    </div>
    <div class="header-right">
        <div class="live-badge">
            <div class="live-dot"></div>
            Live
        </div>
    </div>
</header>

<main class="player-section">
    <div class="player-card">
        <div class="channel-bar">
            <div class="channel-label">
                <div class="channel-icon">🏏</div>
                <div>
                    <div class="channel-name">Willow Cricbuzz</div>
                </div>
            </div>
            <div class="live-badge" style="font-size:11px;">
                <div class="live-dot"></div>
                On Air
            </div>
        </div>

        <div class="video-wrapper">
            <video id="cricket-video" controls autoplay playsinline></video>
        </div>
    </div>
</main>

<footer>
    &copy; SPORTLINK — All rights reserved
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<script>
    const M3U8_URL = 'https://hls.ratanliton2.workers.dev/?url=http://xui.mainserver.cc/play/oCkZyqACmAE6FvzKu_186PEFGOk9LoJ4xGfS1beyo7s/.m3u8';

    function loadStream(url) {
        const video = document.getElementById('cricket-video');
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play().catch(() => {});
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadStream(M3U8_URL);
    });
</script>
</body>
</html>
