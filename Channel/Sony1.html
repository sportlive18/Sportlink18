<!DOCTYPE html>
<html lang="en">
<head>
  <title>Sportlink</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="referrer" content="no-referrer"/>
  
  <!-- Plyr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css"/>

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Plyr JS -->
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>

  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    html, body {
      height: 100%;
      width: 100%;
    }
    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    .plyr {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <video autoplay playsinline muted id="player" controls preload="metadata"></video>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const video = document.getElementById("player");
      const source = "https://eus23.playlist.live-video.net/v1/playlist/CroFUpI5HLkEgdFox-oZ3E1tDi-dHIgQo0YE3Hcy7cCGzZX6u9FijWmGyWqI3CXQGNv7BV2lntDMe7o_ySMNkgSGuf5aZ_ZyloO-5PgXlRb445VrnHP_46QcgKmehfWUZOcpSh-hGh4dsdWUJSuVy9ERFpTJZzGUHxYhWPGgYUHw0SzQ2gXgFMeDBoOAblJkfZre6MTAw3UoDOJUZa2MIrLTYM4lnfMoZDUVYBvAZ5OdSONohsB0sVafrHXVd8J_nxyAGEAUXWvmue72fqLLA8D-WGCnA_cKUnX275PVBTdustPHrhvXn5wgP05uuDp9dWFYQPetf8LJSOt2A8FI5DQxfNtKcCGA9CpZKmNCMh5u0mlULznrryZdYE8BjJoZUFU3_q3uo7Af9lqxaOmSGtjZ3bH9UuUZwGK6PEY6uyPOkuHGjf-4nbScD_Sdk_Jl8ebbzgk20F_M6ugyu1mIVUG70qFF-d6OLKy7X-H_vFWNDltUI-OLmltaPpPkfKXoszkztNHSsPfq33akctCt5yv37HaF6tu5Icka5h-G_8NQ_FOSmGR00tDKkcI00ebVUr7TkrlbJFDUuKpFfzfw9DUm0cKcARigixZMPnDuuwhsgIVKSfX2eVqt5N27NtVJrtEwKHZDVUJq2XUcWsJJldxeoQSGh15TvOr5y1gjq6LMZXufo-_rLwZltzKddPwTjAl7rSyJ3jLoOb_Ol-oTjjpkaLIkucdNw8JcIkBkX1Zw3FBh-55XEmaGJE136ccv7rOoZrRKeqjH2SBZi_0x_pr0huWHQ3oc1cwh5AcHvx35xMQwZtHvZDkUGFQqAYpBOy60l7q2yGHR_dWYP4jH9IGSSay2HQRSi9RhfT4Cyebcqx0kaasfE9RNSJPp2hfE5UFgos-JCmyfRlAe8PIvlugCug2c-3sZJFdZoeMaDE67i2Eqb46jGe9l9yABKglldS13ZXN0LTIwoA8.m3u8";

      const defaultOptions = {
        autoplay: true,
        controls: [
          'play', 'rewind', 'fast-forward', 'progress', 'current-time',
          'mute', 'volume', 'settings', 'fullscreen'
        ],
        settings: ['quality']
      };

      let player;

      function setupPlayer(hls, qualities = []) {
        player = new Plyr(video, {
          ...defaultOptions,
          quality: qualities.length ? {
            default: qualities[0],
            options: qualities,
            forced: true,
            onChange: q => {
              hls.levels.forEach((level, index) => {
                if (level.height === q) {
                  hls.currentLevel = index;
                }
              });
            }
          } : {}
        });

        // 🔁 AUTO RESUME
        setInterval(() => {
          if (video.paused && video.readyState > 2) {
            video.play().catch(()=>{});
          }
        }, 3000);

        // 🔊 AUTO UNMUTE (on first interaction)
        const unmute = () => {
          video.muted = false;
          video.volume = 1;
          document.removeEventListener("click", unmute);
          document.removeEventListener("touchstart", unmute);
        };

        document.addEventListener("click", unmute);
        document.addEventListener("touchstart", unmute);
      }

      if (Hls.isSupported()) {
        const hls = new Hls({
          autoStartLoad: true
        });

        hls.loadSource(source);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
          const availableQualities = data.levels.map(l => l.height).sort((a,b) => b - a);
          video.play().catch(()=>{});
          setupPlayer(hls, availableQualities);
        });

        // 🔥 AUTO RECOVER ON ERROR
        hls.on(Hls.Events.ERROR, function (_, data) {
          if (data.fatal) {
            hls.startLoad();
          }
        });

      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = source;
        video.addEventListener("loadedmetadata", () => {
          video.play().catch(()=>{});
          setupPlayer(null);
        });
      }
    });
  </script>
</body>
</html>
