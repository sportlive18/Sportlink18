<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Sports - Sportlink (Hindi)</title>
<meta name="referrer" content="no-referrer">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

  <style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}

.shaka-video-container{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}
</style>
</head>
<body>

<div class="shaka-video-container" id="player-container">
<video id="video" autoplay muted playsinline preload="metadata"></video>
</div>

<script>
(function(){
  const CONFIG={
    streamUrl:"https://jiotvioslive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd",
    keyId:"400131994b445d8c8817202248760fda",
    key:"2d56cb6f07a75b9aff165d534ae2bfc4",
    cookieUrl:"https://allrounder-live2.pages.dev/api/cookie.json"
  };

  document.addEventListener("DOMContentLoaded",async()=>{
    shaka.polyfill.installAll();
    const video=document.getElementById("video");
    const container=document.getElementById("player-container");
    const player=new shaka.Player();
    await player.attach(video);
    const ui=new shaka.ui.Overlay(player,container,video);

    player.configure({
      drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}},
      manifest:{defaultPresentationDelay:5},
      streaming:{lowLatencyMode:true}
    });

    let cookieValue="";
    try{
      const response=await fetch(CONFIG.cookieUrl,{cache:"no-store"});
      const data=await response.json();
      cookieValue=data.cookie||"";
    }catch(e){}

    if(cookieValue){
      player.getNetworkingEngine().registerRequestFilter((type,request)=>{
        request.headers["Referer"]="https://www.jiotv.com/";
        request.headers["User-Agent"]="plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
        request.headers["Cookie"]=cookieValue;
      });
    }

    try{
      await player.load(CONFIG.streamUrl);
      video.play().catch(()=>{});
    }catch(e){}
  });
})();
</script>
</body>
</html>
