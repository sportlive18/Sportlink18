<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Sports 1 HD Hindi | Sportlink</title>
<meta name="referrer" content="no-referrer">
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #ff3c3c;
    --primary-glow: rgba(255, 60, 60, 0.3);
    --secondary: #8a2be2;
    --accent: #00f2ff;
    --bg: #050505;
    --surface: rgba(255, 255, 255, 0.05);
    --text: #ffffff;
    --glass-border: rgba(255, 255, 255, 0.1);
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Outfit', sans-serif;color:var(--text)}

/* Premium Background Elements */
body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.05;
    pointer-events: none;
    z-index: 999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
}

.bg-blobs {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}

.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.1;
    animation: float 20s infinite alternate;
}

.blob-1 { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; }
.blob-2 { width: 500px; height: 500px; background: var(--secondary); bottom: -150px; right: -100px; animation-duration: 25s; }

@keyframes float {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(50px, 50px) scale(1.1); }
}

.shaka-video-container{
    position:fixed;
    inset:0;
    background:transparent;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* Header/Overlay */
.player-header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 20px 30px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.back-btn {
    color: white;
    text-decoration: none;
    font-size: 24px;
    background: rgba(255,255,255,0.05);
    width: 45px;
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    transition: all 0.3s;
}

.back-btn:hover { background: var(--primary); transform: scale(1.1); box-shadow: 0 0 20px var(--primary-glow); }

.channel-info { display: flex; align-items: center; gap: 15px; }

.channel-logo {
    height: 40px;
    width: auto;
    border-radius: 8px;
    filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
}

.channel-name {
    color: white;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

.social-overlay {
    position: absolute;
    bottom: 80px;
    right: 30px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.social-tag {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    padding: 10px 20px;
    border-radius: 50px;
    color: white;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s;
}

.social-tag:hover { background: var(--primary); transform: translateX(-10px); box-shadow: 0 10px 20px var(--primary-glow); }

.custom-watermark{
    position:absolute;
    z-index:40;
    pointer-events:none;
    top:25px;
    right:35px;
    font-size:14px;
    font-weight:800;
    color:rgba(255,255,255,0.15);
    letter-spacing: 2px;
}

/* --- Block Overlay --- */
.block-overlay{
    position:fixed;
    inset:0;
    z-index:99999;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
    text-align:center;
}

.block-box{
    padding:40px;
    max-width:500px;
    width:90%;
    background:rgba(20, 20, 20, 0.95);
    border-radius:24px;
    border:1px solid var(--glass-border);
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.block-title{ font-size:32px; font-weight:800; color:#fff; margin-bottom:15px; text-transform: uppercase; letter-spacing: -1px;}
.block-sub{ font-size:14px; color:rgba(255,255,255,0.6); line-height:1.6; }

@media(max-width:700px){
    .player-header { padding: 15px 20px; }
    .channel-name { font-size: 16px; }
    .channel-logo { height: 30px; }
}
</style>
</head>
<body>

<div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
</div>

<div class="player-header" id="header">
    <a href="../index.html" class="back-btn">←</a>
    <div class="channel-info">
        <img src="https://jiotv.catchup.cdn.jio.com/dare_images/images/Star_Sports_HD1_Hindi.png" alt="" class="channel-logo" onerror="this.style.display='none'">
        <span class="channel-name">Star Sports 1 HD Hindi</span>
    </div>
</div>

<div class="shaka-video-container" id="player-container">
    <video id="video" autoplay muted playsinline preload="metadata"></video>
    <div class="custom-watermark">SPORTLINK</div>
</div>

<script>
(function(){
  
  function isSandboxedEnv(){
    try {
      if (window.self === window.top) return false;
      if (window.frameElement && window.frameElement.hasAttribute("sandbox")) return true;
      try {
        document.domain = document.domain;
        if (window.frameElement && !window.frameElement.getAttribute("sandbox")) return false;
      } catch (e) { return true; }
      return false;
    } catch(e) { return true; }
  }

  function triggerBlockScreen(title, message){
    const container = document.getElementById("player-container");
    const video = document.getElementById("video");
    try {
      video.pause();
      video.removeAttribute('src');
      video.load();
    } catch(e){}

    const overlay = document.createElement("div");
    overlay.className = "block-overlay";
    overlay.innerHTML = `
      <div class="block-box">
        <div class="block-title">${title}</div>
        <div class="block-sub">${message}</div>
      </div>
    `;
    document.body.appendChild(overlay);
    container.style.display = 'none';
    document.getElementById('header').style.display = 'none';
  }

  if(isSandboxedEnv()){
    triggerBlockScreen('Access Denied', 'Please open in a standard browser and disable ad-blockers.');
    return;
  }

  const CONFIG={
    streamUrl:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd",
    keyId:"400131994b445d8c8817202248760fda",
    key:"2d56cb6f07a75b9aff165d534ae2bfc4",
    licenseUrl:"",
    cookie:""
  };

  document.addEventListener("DOMContentLoaded",async()=>{
    shaka.polyfill.installAll();
    if(!shaka.Player.isBrowserSupported()) return;

    const video=document.getElementById("video");
    const container=document.getElementById("player-container");
    const header=document.getElementById("header");

    // Hide header after 3 seconds of inactivity
    let hideTimeout;
    const showHeader = () => {
        header.style.opacity = '1';
        clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => {
            header.style.opacity = '0';
        }, 3000);
    };
    container.addEventListener('mousemove', showHeader);
    container.addEventListener('touchstart', showHeader);
    showHeader();

    const player=new shaka.Player();
    await player.attach(video);

    const ui=new shaka.ui.Overlay(player,container,video);
    ui.configure({
      addBigPlayButton: true,
      controlPanelElements: ["mute","play_pause","time_and_duration","spacer","quality","picture_in_picture","fullscreen"]
    });

    const drmConfig = {};
    if (CONFIG.keyId && CONFIG.key) {
      drmConfig.clearKeys = {[CONFIG.keyId]: CONFIG.key};
    } else if (CONFIG.licenseUrl) {
      drmConfig.servers = {'com.widevine.alpha': CONFIG.licenseUrl};
    }

    player.configure({
      drm: drmConfig,
      manifest:{defaultPresentationDelay:5},
      streaming:{ lowLatencyMode:true, bufferingGoal:10, rebufferingGoal:2 }
    });

    let dynamicToken = null;

    player.getNetworkingEngine().registerResponseFilter((type, response) => {
        if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
            try {
                const url = new URL(response.uri);
                const hdnea = url.searchParams.get("__hdnea__");
                if (hdnea) {
                    dynamicToken = hdnea;
                }
            } catch (e) {}
        }
    });

    player.getNetworkingEngine().registerRequestFilter((type,request)=>{
        request.headers["Referer"]="https://www.jiotv.com/";
        request.headers["User-Agent"]="plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
        
        if (dynamicToken && type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
            if (!request.uris[0].includes("__hdnea__")) {
                const sep = request.uris[0].includes("?") ? "&" : "?";
                request.uris[0] += sep + "__hdnea__=" + dynamicToken;
            }
        }

        if(CONFIG.cookie){
            request.headers["Cookie"]=CONFIG.cookie;
            let urlCookie=CONFIG.cookie.startsWith("__hdnea__=")?CONFIG.cookie.substring(10):CONFIG.cookie;
            if((type===shaka.net.NetworkingEngine.RequestType.MANIFEST||
                type===shaka.net.NetworkingEngine.RequestType.SEGMENT)&&
                !request.uris[0].includes("__hdnea__")){
                const sep=request.uris[0].includes("?")?"&":"?";
                request.uris[0]+=sep+"__hdnea__="+urlCookie;
            }
        }
    });

    try{
      await player.load(CONFIG.streamUrl);
      video.play().catch(()=>{});
    }catch(e){}

    video.addEventListener("play",()=>{ video.muted=false; });
  });
})();
</script>
</body>
</html>
