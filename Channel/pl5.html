<!DOCTYPE html>
<html lang="en">
<head>
  <title>Sportlink</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="referrer" content="no-referrer"/>

  <!-- Plyr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css"/>

  <!-- dash.js -->
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

  <!-- Plyr JS -->
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>

  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    html, body {
      height: 100%;
      width: 100%;
    }
    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    .plyr {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <video autoplay playsinline muted id="player" controls preload="metadata"></video>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const video = document.getElementById("player");
      const source = "https://estreams.tv.nej.cz/dash/CH_TVP_SPORT_Portable.ism/playlist.mpd";

      const defaultOptions = {
        autoplay: true,
        controls: [
          'play', 'rewind', 'fast-forward', 'progress', 'current-time',
          'mute', 'volume', 'settings', 'fullscreen'
        ],
        settings: ['quality']
      };

      let player;
      let dashPlayer;

      function setupPlayer(qualities = []) {
        player = new Plyr(video, {
          ...defaultOptions,
          quality: qualities.length ? {
            default: qualities[0],
            options: qualities,
            forced: true,
            onChange: q => {
              if (!dashPlayer) return;
              const bitrateList = dashPlayer.getBitrateInfoListFor("video");
              const match = bitrateList.findIndex(b => b.height === q);
              if (match !== -1) {
                dashPlayer.setQualityFor("video", match);
              }
            }
          } : {}
        });

        // 🔁 AUTO RESUME
        setInterval(() => {
          if (video.paused && video.readyState > 2) {
            video.play().catch(() => {});
          }
        }, 3000);

        // 🔊 AUTO UNMUTE (on first interaction)
        const unmute = () => {
          video.muted = false;
          video.volume = 1;
          document.removeEventListener("click", unmute);
          document.removeEventListener("touchstart", unmute);
        };

        document.addEventListener("click", unmute);
        document.addEventListener("touchstart", unmute);
      }

      // dash.js setup
      dashPlayer = dashjs.MediaPlayer().create();
      dashPlayer.initialize(video, source, true);

      // Disable dash.js ABR so Plyr quality selector has control
      dashPlayer.updateSettings({
        streaming: {
          abr: {
            autoSwitchBitrate: { video: false }
          }
        }
      });

      dashPlayer.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, () => {
        const bitrateList = dashPlayer.getBitrateInfoListFor("video");
        const qualities = bitrateList
          .map(b => b.height)
          .filter(Boolean)
          .sort((a, b) => b - a);

        video.play().catch(() => {});
        setupPlayer(qualities);
      });

      // 🔥 AUTO RECOVER ON ERROR
      dashPlayer.on(dashjs.MediaPlayer.events.ERROR, (e) => {
        console.warn("dash.js error:", e);
        // Attempt reload on fatal errors
        if (e && e.error && e.error.code) {
          setTimeout(() => {
            dashPlayer.attachSource(source);
          }, 3000);
        }
      });
    });
  </script>
</body>
</html>
