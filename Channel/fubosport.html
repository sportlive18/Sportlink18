<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportlink Fubosport</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    .shaka-video-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }
    .shaka-spinner-container,
    .shaka-spinner,
    .shaka-spinner-svg {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }
    #blocked-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 99999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    #blocked-screen h1 {
      color: red;
      font-size: 2rem;
    }
    #blocked-screen p {
      color: #aaa;
      margin-top: 10px;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <!-- Blocked Screen Overlay -->
  <div id="blocked-screen">
    <h1>⚠️ Access Denied</h1>
    <p>Developer tools are not allowed on this page.</p>
  </div>

  <div class="shaka-video-container" data-shaka-player id="player-wrapper">
    <video autoplay playsinline preload="metadata" poster="https://assets.tntsports.io/web/img/og/tntsports.jpg"></video>
  </div>

  <script>
    // ============================================
    // 🔒 PROTECTION BLOCK — RUNS IMMEDIATELY
    // ============================================

    const BLOCK = () => {
      document.getElementById('blocked-screen').style.display = 'flex';
      document.getElementById('player-wrapper').style.display = 'none';
    };

    // 1. Disable Right Click
    document.addEventListener('contextmenu', e => e.preventDefault());

    // 2. Block Keyboard Shortcuts
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12') { e.preventDefault(); BLOCK(); }
      if (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c','K','k'].includes(e.key)) { e.preventDefault(); BLOCK(); }
      if (e.ctrlKey && ['U','u','S','s','A','a'].includes(e.key)) { e.preventDefault(); }
    });

    // 3. Disable Copy / Cut / Drag / Select
    document.addEventListener('copy', e => e.preventDefault());
    document.addEventListener('cut', e => e.preventDefault());
    document.addEventListener('dragstart', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());

    // 4. DevTools Size Detection
    setInterval(() => {
      const threshold = 160;
      if (
        window.outerWidth - window.innerWidth > threshold ||
        window.outerHeight - window.innerHeight > threshold
      ) { BLOCK(); }
    }, 500);

    // 5. console.log Image Trick
    const trap = new Image();
    Object.defineProperty(trap, 'id', {
      get: function() { BLOCK(); }
    });
    setInterval(() => {
      console.log('%c', trap);
      console.clear();
    }, 1000);

    // 6. Debugger Trap (slows down DevTools)
    setInterval(function() {
      (function() { return false; })
      ['constructor']('debugger')['call']();
    }, 100);

    // 7. Timing-based DevTools detection on load
    window.addEventListener('load', () => {
      const start = performance.now();
      debugger;
      if (performance.now() - start > 100) { BLOCK(); }
    });

    // ============================================
    // 🎬 SHAKA PLAYER
    // ============================================
    document.addEventListener('DOMContentLoaded', async () => {
      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        console.error('Browser not supported');
        return;
      }

      const video = document.querySelector('video');
      const player = new shaka.Player();
      await player.attach(video);

      const container = document.querySelector('.shaka-video-container');
      const ui = new shaka.ui.Overlay(player, container, video);

      ui.configure({
        controlPanelElements: [
          'play_pause', 'time_and_duration', 'mute', 'volume',
          'spacer', 'language', 'captions', 'picture_in_picture',
          'quality', 'fullscreen'
        ],
        volumeBarColors: {
          base: 'rgba(255, 192, 203, 0.3)',
          level: 'rgb(255, 105, 180)'
        },
        seekBarColors: {
          base: 'rgba(255, 255, 0, 0.3)',
          buffered: 'rgba(255, 255, 0, 0.6)',
          played: 'rgb(255, 255, 0)'
        }
      });

      let drmConfig = {
        clearKeys: {
          "dc69b6159a0f9f0a4e03b3ff91cbacd5": "d0dcbcd7723bc40df0bf34c9c092d51f"
        }
      };

      let streamUrl = "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/3b7qwiqzk3/out/v1/9f14895badca43e6a716db021dcd0c31/cenc.mpd";

      player.configure({
        drm: drmConfig,
        streaming: {
          lowLatencyMode: true,
          bufferingGoal: 15,
          rebufferingGoal: 2,
          bufferBehind: 15,
          retryParameters: {
            timeout: 10000,
            maxAttempts: 5,
            baseDelay: 300,
            backoffFactor: 1.2
          },
          segmentRequestTimeout: 8000,
          segmentPrefetchLimit: 2,
          useNativeHlsOnSafari: true
        },
        manifest: {
          retryParameters: {
            timeout: 8000,
            maxAttempts: 3
          }
        }
      });

      player.addEventListener('error', (event) => {
        console.error('Shaka Player Error:', event.detail);
      });

      try {
        await player.load(streamUrl);
      } catch (error) {
        console.error('Load error:', error);
      }
    });
  </script>
</body>
</html>
