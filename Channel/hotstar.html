<!DOCTYPE html>
<html lang="en">
<head>
  <title>Fox Cricket</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="referrer" content="no-referrer"/>
  
  <!-- Plyr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css"/>

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Plyr JS -->
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>

  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    html, body {
      height: 100%;
      width: 100%;
    }
    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    .plyr {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <video autoplay playsinline muted id="player" controls preload="metadata"></video>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const video = document.getElementById("player");
      const source = "
https://eus21.playlist.live-video.net/v1/playlist/CrgFoYfQHrDd7y3W2f8bv8IUgrQntkHrOe2_Q9ap7G_3HR5YeQ6OmGgB2CefFk1H-HOnbejkE64RV_5KY4rc8_OHk4E-A1geypUFF9japFwM4dcylt2ghWWhb1u2a8kNtOPme0Ay-m4e9grtMbmu63bLQ7qyoP0LGPxIrrBcExwkHXJukQMF0rqDM3slsgBzHgKxtea-4-Hqqw0-XQrw_KmdFcsbzVhS_inFNIIpZSE6HdQzU-FQfUsgquuURV6vZbfiw39XuMSOM_9QsqJZbFegqjkAmYa5GPs5P92j8A6JxvrAJfXneWOC8JDhmm9ZtYDkEwwiNtt8bgKuxlHzEO8eqZMd2aez69GF77qe4gr8qMgUTtJXVI0Y-5Xk-Rb7zPqj8S1dPuLZY8jYp2oF-ssREc1psJO2N4J4m1fMC-8tjNeJbKCMrt-mBRL8G6Tk69Nd7ftkrFblB5EpSlmXWPpO1kixTXHvUjYZgJvvDCKwmUxrIUH2wg3st-x-U2r_Gfsk092iDIxFpjcp7koUCj4POnTm1CISSq6ho1xKiHaeFcCWr3qVTVmXLYjWKiUo9VPeeKYPeXy1BCj19uaWtYkSmC5lEuIk7bJ8cOOENxQEoZyKoVZMV8WnzoL785HeOcnzDePXjo2PAia8riAOy-fm0wyzdxZ0MKFsjEgTPG3j_KWx0v7-y023ePF47OEOWwD1JPBxKYOY9We2yg6g-eTZVGnh6v68GSiNPPZU0NuFWDWCCLDmqA_z8CbdmznOGgzlXhbv7A6AOaaIVe1uY-8_JmkPZ-IvtXUbzxKkjznzlFIGr3cNFcDUpT3IBZAnoGGuWBciqzx4OPXkVS5teLUt37wt8ni5tn4Z_kMhTy6XUzjfcIhbaT0cPdmCB07N6nH7df82NXLyvxkIAhzPdOlVAlZ8JpV8rVLmGgxOtA244UqV_ZBkxo8gASoJZXUtd2VzdC0yMJUP.m3u8";
      const defaultOptions = {
        autoplay: true,
        controls: [
          'play', 'rewind', 'fast-forward', 'progress', 'current-time',
          'mute', 'volume', 'settings', 'fullscreen'
        ],
        settings: ['quality']
      };

      let player;

      function setupPlayer(hls, qualities = []) {
        player = new Plyr(video, {
          ...defaultOptions,
          quality: qualities.length ? {
            default: qualities[0],
            options: qualities,
            forced: true,
            onChange: q => {
              hls.levels.forEach((level, index) => {
                if (level.height === q) {
                  hls.currentLevel = index;
                }
              });
            }
          } : {}
        });

        // 🔁 AUTO RESUME
        setInterval(() => {
          if (video.paused && video.readyState > 2) {
            video.play().catch(()=>{});
          }
        }, 3000);

        // 🔊 AUTO UNMUTE (on first interaction)
        const unmute = () => {
          video.muted = false;
          video.volume = 1;
          document.removeEventListener("click", unmute);
          document.removeEventListener("touchstart", unmute);
        };

        document.addEventListener("click", unmute);
        document.addEventListener("touchstart", unmute);
      }

      if (Hls.isSupported()) {
        const hls = new Hls({
          autoStartLoad: true
        });

        hls.loadSource(source);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
          const availableQualities = data.levels.map(l => l.height).sort((a,b) => b - a);
          video.play().catch(()=>{});
          setupPlayer(hls, availableQualities);
        });

        // 🔥 AUTO RECOVER ON ERROR
        hls.on(Hls.Events.ERROR, function (_, data) {
          if (data.fatal) {
            hls.startLoad();
          }
        });

      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = source;
        video.addEventListener("loadedmetadata", () => {
          video.play().catch(()=>{});
          setupPlayer(null);
        });
      }
    });
  </script>
</body>
</html>
