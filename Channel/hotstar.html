<!DOCTYPE html>
<html lang="en">
<head>
  <title>HOTSTAR</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="referrer" content="no-referrer"/>
  
  <!-- Plyr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css"/>

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Plyr JS -->
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>

  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    html, body {
      height: 100%;
      width: 100%;
    }
    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    .plyr {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <video autoplay playsinline muted id="player" controls preload="metadata"></video>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const video = document.getElementById("player");
      const source = "
https://eus23.playlist.live-video.net/v1/playlist/CrkFOOa3DaQrpXf9IrGfN0nF0z0ibTFevyX0ZvuWQpSSfqnQPx7T7y-4-1PayjY8QEVQ6dT3qr32qnGyrYA1AIAXbzKxf0EggAm6cJnA_pfxMhJ9AvAZhNShjBj1jRUBuMUe2NRPTTaNaonap_q81xFutNuL1QmSTfD2lyYFNwfCemi04G9QGuKgruLUy4RY5aqDQXlgmfIjKLfttkfuzGcHRMAgyFbt6MXdxzqoOTdDF19FmOil8KrkYhj3BXZ80_9bMbXREOdr1i-aq_TgSO9DFj34bV8B0X3Hocg4USTDaovtWfOhVwJx51Y5tv_fCgIITbcoo0OZuzWWIVI9bDEpAnBQSnSkvbe3jcrrhVqb6LaEDh0YCtJ2yiD0KDtVe6LeEX1lJB2bEKDywW17qksm822OHeMcNOU_yANrEzJwgCTj3vzHKr4pc74e1Jj7KhU64LP-jebqbq8elM-F6o_wqkJ76oH1wb9kHmFF7x7-cGb9seLcf4qdLk9lbTKy5Im6nYg8knLNcv2UQiF6Cg55o5J_Kni6SFJtEs8mZCedd66VE6mbEj_wTwoewAV5DUKXQOBOc-R33sSn8Wje5CL194ZDakmzfwz2NNDLVuHZMqvhG4Bth92jvzG_D34LFj6h4viRhuPQyGaHhpbgR_OY4aTF5kul3kHojjShHBY-VfecdswdZjFWWbnFCGS0vHoMr0sJ4dKP8XK4GGQ5AOFJs1tEKpYf4lnnH7ivonbbd7Tl6Al4kPqZWl9EOR58N07sX5Ni0U2X885MEl3Tj41ofNq0cr4Y3Yj5u3CUArwCJcBLvFmNllc7N_jk8E4Y0opgijTXD844IK71brbkRolyM0wfmIPC-L5PQ_dHs2qLbxtY_Zp4jtvf3g5FRaYEW3EkvOmyk3alMTKWwewqoOJo_N8Uz6Qhrs8bSBoMWjvDE2NHOggNKlmPIAEqCWV1LXdlc3QtMjCWDw.m3u8";
      const defaultOptions = {
        autoplay: true,
        controls: [
          'play', 'rewind', 'fast-forward', 'progress', 'current-time',
          'mute', 'volume', 'settings', 'fullscreen'
        ],
        settings: ['quality']
      };

      let player;

      function setupPlayer(hls, qualities = []) {
        player = new Plyr(video, {
          ...defaultOptions,
          quality: qualities.length ? {
            default: qualities[0],
            options: qualities,
            forced: true,
            onChange: q => {
              hls.levels.forEach((level, index) => {
                if (level.height === q) {
                  hls.currentLevel = index;
                }
              });
            }
          } : {}
        });

        // 🔁 AUTO RESUME
        setInterval(() => {
          if (video.paused && video.readyState > 2) {
            video.play().catch(()=>{});
          }
        }, 3000);

        // 🔊 AUTO UNMUTE (on first interaction)
        const unmute = () => {
          video.muted = false;
          video.volume = 1;
          document.removeEventListener("click", unmute);
          document.removeEventListener("touchstart", unmute);
        };

        document.addEventListener("click", unmute);
        document.addEventListener("touchstart", unmute);
      }

      if (Hls.isSupported()) {
        const hls = new Hls({
          autoStartLoad: true
        });

        hls.loadSource(source);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
          const availableQualities = data.levels.map(l => l.height).sort((a,b) => b - a);
          video.play().catch(()=>{});
          setupPlayer(hls, availableQualities);
        });

        // 🔥 AUTO RECOVER ON ERROR
        hls.on(Hls.Events.ERROR, function (_, data) {
          if (data.fatal) {
            hls.startLoad();
          }
        });

      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = source;
        video.addEventListener("loadedmetadata", () => {
          video.play().catch(()=>{});
          setupPlayer(null);
        });
      }
    });
  </script>
</body>
</html>
