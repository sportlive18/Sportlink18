<!DOCTYPE html>
<html lang="en">
<head>
  <title>Fox Cricket</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="referrer" content="no-referrer"/>
  
  <!-- Plyr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css"/>

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Plyr JS -->
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>

  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    html, body {
      height: 100%;
      width: 100%;
    }
    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    .plyr {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <video autoplay playsinline muted id="player" controls preload="metadata"></video>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const video = document.getElementById("player");
      const source = "https://eus21.playlist.live-video.net/v1/playlist/Cp8Fs9BHRy2HkQNOfigPzziO7nZdZuDBUx1bpwIx-crLVAIUxvB8-lmBeclwi1SvE_EjsmvKBiBDamMCfuHkiRnlwP4lXdDcf11zANSjWZbpdh4uHJF6Nn7hxrMzMeWGyaQC3NW4z97zAt-V9kZrV86JeI5rfkBZYB2dj7KCarbx9FOAW6rqXFkBopJ89zgidLMUm1VYsM2W2AMsaiooI81c7O8JQU6Dhs7ekX-4xE2eZyFUZPPT3PRqDT5ZrUrQQAl5X_MiKftK-OCtliY-3XJU_2BFwjmTQwpJVALGCzxz3O2hlZFAc5F6fAeHxVI6dsoe1OpFa48O2nAWj6ZpPmq8uKYR54T6rdAQZIyuoCeKatSUN291d25Xvs1Gkj4HTPF1ZAv1JTY2o61GfFP6UhXo-Ieo5fjHhhoMIkM5bKTTZZe5hFyTwgyVnRRXVKG72c3Wo7Dlh58t7A8az6ND4eY81DZQDogBtWxGGhYcCsIVUYh07tUAoD9MVeN_8ZIC1ke-4czOmyDycsby3yGxfn6FxYMh6DWH7FUvJkv2ShBfXpzKZu5_OJN1H6OemhaxGPygrQTvE1l33qDjjYdCGLcTylG-eNKM9L3jDGa8ja1CEnv5S3KJnI3F9BIRpB79ImoCepqMo-BmlNJsg4SrhsyUJveemmjySuaiX6LiztRUZjCCsyL8bxT8F1GKd3bj1zw9ajL2UXAcCOEnvUnYuo3JsQNxZZaA69xxVeHsqTs05O1aFHzhpE4bem1s8GuWDIsw_-qByAmn0oMuKfVrO7IufgMVJeDXjlDbiiFudPw-1lJeVoFh75o7QAIa7PC0FXgILyshA35wpknSpiddHYJJIQpB7dSHyBlX87dwAUS7wo-tWMOjgJI19fE01EQHbr0aDBMhWpsbSkfaNmTqGiABKglldS13ZXN0LTIwlQ8.m3u8";

      const defaultOptions = {
        autoplay: true,
        controls: [
          'play', 'rewind', 'fast-forward', 'progress', 'current-time',
          'mute', 'volume', 'settings', 'fullscreen'
        ],
        settings: ['quality']
      };

      let player;

      function setupPlayer(hls, qualities = []) {
        player = new Plyr(video, {
          ...defaultOptions,
          quality: qualities.length ? {
            default: qualities[0],
            options: qualities,
            forced: true,
            onChange: q => {
              hls.levels.forEach((level, index) => {
                if (level.height === q) {
                  hls.currentLevel = index;
                }
              });
            }
          } : {}
        });

        // 🔁 AUTO RESUME
        setInterval(() => {
          if (video.paused && video.readyState > 2) {
            video.play().catch(()=>{});
          }
        }, 3000);

        // 🔊 AUTO UNMUTE (on first interaction)
        const unmute = () => {
          video.muted = false;
          video.volume = 1;
          document.removeEventListener("click", unmute);
          document.removeEventListener("touchstart", unmute);
        };

        document.addEventListener("click", unmute);
        document.addEventListener("touchstart", unmute);
      }

      if (Hls.isSupported()) {
        const hls = new Hls({
          autoStartLoad: true
        });

        hls.loadSource(source);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
          const availableQualities = data.levels.map(l => l.height).sort((a,b) => b - a);
          video.play().catch(()=>{});
          setupPlayer(hls, availableQualities);
        });

        // 🔥 AUTO RECOVER ON ERROR
        hls.on(Hls.Events.ERROR, function (_, data) {
          if (data.fatal) {
            hls.startLoad();
          }
        });

      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = source;
        video.addEventListener("loadedmetadata", () => {
          video.play().catch(()=>{});
          setupPlayer(null);
        });
      }
    });
  </script>
</body>
</html>
