<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Willow</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .shaka-video-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }
    .shaka-spinner-container,
    .shaka-spinner,
    .shaka-spinner-svg {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }

    /* Stream switcher UI */
    #stream-switcher {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      display: flex;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    body:hover #stream-switcher { opacity: 1; }
    .stream-btn {
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.05em;
      transition: background 0.2s, border-color 0.2s;
    }
    .stream-btn:hover { background: rgba(255,255,255,0.15); }
    .stream-btn.active {
      background: rgba(255, 220, 0, 0.2);
      border-color: rgb(255, 220, 0);
      color: rgb(255, 220, 0);
    }

    /* Status indicator */
    #status {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 20px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #status.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="shaka-video-container" data-shaka-player>
    <video autoplay playsinline preload="metadata" poster=""></video>
  </div>

  <div id="stream-switcher">
    <button class="stream-btn active" onclick="switchStream(0)">Stream 1</button>
    <button class="stream-btn" onclick="switchStream(1)">Stream 2</button>
  </div>

  <div id="status"></div>

  <script>
    const STREAMS = [
      {
        label: "Stream 1",
        url: "https://a151aivottlinear-a.akamaihd.net/OTTB/sin-nitro/live/dash/enc/k0duzgfejg/out/v1/70a50b1bda944628b8e7e66ab4069419/cenc.mpd",
        clearKeys: {
          "620e51b82596475517a27aa425c52280": "2b9ba811e9c5aeafc8ae1b71cdca4d6a"
        }
      },
      {
        label: "Stream 2",
        url: "https://otte.cache.aiv-cdn.net/iad-nitro/live/clients/dash-sd/enc/ap100z7ju8/out/v1/bd83499afa5c4526a20e8f1813a9ac77/cenc-sd.mpd",
        clearKeys: {
          "e59d71527da753e98bccaeba761ed23e": "141219a8b44c2be17af967fb909ab2eb"
        }
      }
    ];

    let player = null;
    let currentIndex = 0;
    let statusTimer = null;

    function showStatus(msg) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    function updateButtons(activeIndex) {
      document.querySelectorAll('.stream-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === activeIndex);
      });
    }

    async function switchStream(index) {
      if (index === currentIndex) return;
      currentIndex = index;
      updateButtons(index);
      const stream = STREAMS[index];
      showStatus(`Switching to ${stream.label}…`);
      await loadStream(stream);
    }

    async function loadStream(stream) {
      try {
        player.configure({
          drm: { clearKeys: stream.clearKeys },
          streaming: {
            lowLatencyMode: true,
            bufferingGoal: 15,
            rebufferingGoal: 2,
            bufferBehind: 15,
            retryParameters: {
              timeout: 10000,
              maxAttempts: 5,
              baseDelay: 300,
              backoffFactor: 1.2
            },
            segmentRequestTimeout: 8000,
            segmentPrefetchLimit: 2,
            useNativeHlsOnSafari: true
          },
          manifest: {
            retryParameters: {
              timeout: 8000,
              maxAttempts: 3
            }
          }
        });
        await player.load(stream.url);
        console.log(`[LaligaTv] Loaded: ${stream.label}`);
        showStatus(`${stream.label} loaded`);
      } catch (err) {
        console.error('[LaligaTv] Load error:', err);
        showStatus(`Error loading ${stream.label}`);
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        console.error('[LaligaTv] Browser not supported');
        showStatus('Browser not supported');
        return;
      }

      const video = document.querySelector('video');
      player = new shaka.Player();
      await player.attach(video);

      const container = document.querySelector('.shaka-video-container');
      const ui = new shaka.ui.Overlay(player, container, video);

      ui.configure({
        controlPanelElements: [
          'play_pause', 'time_and_duration', 'mute', 'volume',
          'spacer', 'language', 'captions', 'picture_in_picture',
          'quality', 'fullscreen'
        ],
        volumeBarColors: {
          base: 'rgba(255, 192, 203, 0.3)',
          level: 'rgb(255, 105, 180)'
        },
        seekBarColors: {
          base: 'rgba(255, 255, 0, 0.3)',
          buffered: 'rgba(255, 255, 0, 0.6)',
          played: 'rgb(255, 255, 0)'
        }
      });

      player.addEventListener('error', (event) => {
        console.error('[LaligaTv] Shaka error:', event.detail);
      });

      // Load primary stream on start
      await loadStream(STREAMS[0]);
    });
  </script>
</body>
</html>
